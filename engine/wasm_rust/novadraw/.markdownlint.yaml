# Markdown Lint Configuration

# 行长度限制 (默认 80，改为 100)
MD013:
  line_length: 120
  heading_line_length: 120
  code_block_line_length: 120

# 禁用表格列样式检查（过于严格）
MD060: false

# 允许重复标题（用于 Java/Rust 对比章节）
MD024: false

# 允许内联 HTML（Rust trait 语法如 <dyn> 在代码块中）
MD033: false

# 允许相对链接锚点（heading IDs 在不同工具间可能不一致）
MD051: false
