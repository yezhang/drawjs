version: 1
last_updated: "2026-06-12"

purpose: >
  Define the visual verification workflow for Draw2D core milestones. The
  workflow has six stages: Unit Contract Tests, RenderCommand Snapshot,
  Screenshot Capture, Pixel / Semantic Check, AI Visual Review, and Visual
  Report.

output_dir: target/visual-verification

covered_by_main_verify:
  unit_contract_tests: ./agent/workflow-verify.sh

render_command_snapshots:
  policy: >
    Use snapshot tests when a scene can expose deterministic RenderCommand
    output. These checks should be preferred before screenshot checks because
    they localize rendering pipeline errors more precisely.
  commands: []

suites:
  - id: m2-shape-basic-scene
    milestone_id: M2
    app: shape-app
    enabled: false
    required: true
    command: cargo run -p shape-app -- --screenshot=4
    screenshot_glob: apps/shape-app/screenshot/*.png
    timeout_seconds: 180
    review_panel:
      coordinate_system: "image pixel coordinates, origin at top-left"
      expected_layout:
        - 画布应为横向 4:3 左右比例，主体图元分布在上半屏和中部区域；实际像素尺寸以报告中的 Image size 为准。
        - 左上角应有一个橙色矩形容器，黑色边框在外，蓝色椭圆覆盖在其右下区域。
        - 右上角应有一个浅色面板，内部包含红色矩形、绿色椭圆和蓝色水平线。
        - 中部应有多条水平黑线与交叉线段，右中区域应有白色双边框矩形。
      expected_colors:
        - 背景为蓝色，不应与默认文档背景色 RGB(238,238,238) 混淆。
        - 橙色、蓝色、红色、绿色、紫/粉色、黑色边框都应可辨识。
        - 浅色面板和白色边框区域不应被背景色吞没。
      expected_regions:
        - id: left_top_container
          bounds: [90, 90, 410, 315]
          expectation: "橙色填充矩形带黑色边框，蓝色椭圆部分覆盖在右下区域"
        - id: right_top_panel
          bounds: [900, 90, 1300, 410]
          expectation: "浅色面板内有红色矩形、绿色椭圆和蓝色水平线"
        - id: right_middle_box
          bounds: [1180, 480, 1520, 820]
          expectation: "白色双边框矩形保持清晰，无明显漏绘"
      questions:
        - 是否存在图元错层，例如边框被错误覆盖或椭圆层级不符合预期？
        - 是否存在颜色缺失、透明度异常或背景色混淆？
        - 关键区域的相对坐标是否与预期布局一致？
    checks:
      - kind: pixel
        baseline: agent/visual-baselines/shape-app/scene-4-mixed-shapes.png
      - kind: semantic
        rule: mixed_shapes_visible
        checklist:
          - 画面中应出现多个不同颜色、不同形态的基础图元或组合图元。
          - 图元不应与背景色 RGB(238,238,238) 混淆。
          - paintFigure、paintClientArea、paintBorder 的层级不应颠倒。
      - kind: ai_review
        checklist:
          - 检查是否有明显漏绘、错层、裁剪异常或边框覆盖错误。

  - id: m3-nested-clip-scene
    milestone_id: M3
    app: clip-app
    enabled: false
    required: true
    command: cargo run -p clip-app -- --screenshot=0
    screenshot_glob: apps/clip-app/screenshot/*.png
    timeout_seconds: 180
    review_panel:
      coordinate_system: "image pixel coordinates, origin at top-left"
      expected_layout:
        - 父容器裁剪区域应清晰可见。
        - 子内容只允许出现在父 clientArea 和子 bounds 的交集内。
      expected_colors:
        - 被裁剪内容与背景应有明显颜色差异。
        - 裁剪边界附近不应出现残留像素带。
      expected_regions:
        - id: parent_client_area
          bounds: [0, 0, 0, 0]
          expectation: "待具体场景稳定后补充准确 bounds"
      questions:
        - 子内容是否有越过父 clientArea？
        - 裁剪边界是否与可见边框对齐？
    checks:
      - kind: semantic
        rule: children_must_be_clipped_by_parent_client_area
        checklist:
          - 子内容不得越过父节点 clientArea。
          - 子 bounds 裁剪与父 clientArea 裁剪应同时生效。
      - kind: ai_review
        checklist:
          - 检查嵌套裁剪区域是否有 content bleed 或漏裁剪。

  - id: m8-viewport-clip
    milestone_id: M8
    app: viewport-app
    enabled: false
    required: true
    command: cargo run -p viewport-app -- --screenshot-clip
    screenshot_glob: apps/viewport-app/screenshot/*.png
    timeout_seconds: 180
    review_panel:
      coordinate_system: "image pixel coordinates, origin at top-left"
      expected_layout:
        - viewport 边框应固定不动，content 应在边框内部被裁剪。
        - 滚动 origin 只应改变 content 的可见部分，不应移动 viewport 外框。
        - nested viewport 场景中，内外两层裁剪都应同时生效。
      expected_colors:
        - 黑色 viewport 边框应清晰。
        - 黄色原点块、蓝/绿 content 网格不得出现在黑色边框外。
      expected_regions:
        - id: viewport_border
          bounds: [0, 0, 0, 0]
          expectation: "待具体场景稳定后补充准确 bounds；content 不得越界"
      questions:
        - content 是否 bleed 到 viewport 边框外？
        - origin scroll 后边框是否保持稳定？
        - clip 与 transform 的组合是否出现偏移？
    checks:
      - kind: pixel
        baseline: agent/visual-baselines/viewport-app/clip-to-viewport.png
      - kind: semantic
        rule: content_must_not_bleed_outside_viewport_border
        checklist:
          - 黑色 viewport 边框外不应出现黄色原点块。
          - 蓝/绿 content 网格必须被裁剪在 viewport 内。
          - 滚动 origin 后内容应整体平移，但 viewport 边框保持不动。
      - kind: ai_review
        checklist:
          - 判断 viewport clip、origin scroll、zoomed content 是否与 Draw2D 视口语义一致。

  - id: m9-connection-routing
    milestone_id: M9
    app: connections-demo
    enabled: false
    required: true
    command: cargo run -p connections-demo -- --screenshot=0
    screenshot_glob: apps/connections-demo/screenshot/*.png
    timeout_seconds: 180
    review_panel:
      coordinate_system: "image pixel coordinates, origin at top-left"
      expected_layout:
        - source/target 节点应可见，连接线应连接到 anchor 附近。
        - router 生成的折线或直角线应连续，无断裂。
      expected_colors:
        - 连接线与节点颜色应区分明显。
        - decoration 颜色应跟随或匹配连接线样式。
      expected_regions:
        - id: connection_area
          bounds: [0, 0, 0, 0]
          expectation: "待 connections-demo 落地后补充准确 bounds"
      questions:
        - 连接线端点是否落在 anchor 附近？
        - decoration 方向是否与连接线方向一致？
    checks:
      - kind: semantic
        rule: connection_endpoints_must_match_anchors
        checklist:
          - 连线端点应落在 source/target anchor 附近。
          - Manhattan/Fan/Bendpoint 路由不应穿透明显障碍或出现断线。
          - decoration 应跟随连接线方向。
      - kind: ai_review
        checklist:
          - 检查连线是否断裂、错接、装饰方向错误或层级错误。

ai_visual_review:
  role: agent_assisted
  policy: >
    The script creates target/visual-verification/ai-review-request.md. An agent
    with image analysis capability reads the referenced screenshots and records
    the final verdict in the worklog or report. AI review is advisory by default;
    use --strict-ai only when a human/agent verdict has been written back.

report:
  output_dir: target/visual-verification
  formats:
    - json
    - markdown
    - ai-review-request
