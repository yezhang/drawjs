- id: AD-027
  title: M2 effective visible/enabled propagation
  contract: M2 FigureGraph visible/enabled state must expose local and effective
    parent-chain semantics, and graph update entry points must honor effective
    visibility/enabled state instead of only checking the target node's local flag.
  evolution_kind: parity
  milestone_id: M2
  priority: high
