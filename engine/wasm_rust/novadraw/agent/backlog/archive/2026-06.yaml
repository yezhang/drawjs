  - "`repaint` 改为按有效可见性过滤；validation phase 改为按有效可见性与有效启用状态过滤。"
  - 新增 M2 定向测试覆盖父链 visible/enabled 传播、隐藏祖先下 repaint 无 dirty region、隐藏/禁用祖先下 validation queue drain 但不验证 child。
  done_when:
