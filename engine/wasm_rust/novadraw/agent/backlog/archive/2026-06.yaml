    和 hit-test 通过父节点遍历能自然跳过隐藏子树，但 repaint 与 validation
    可直接以 child id 作为入口，仍只检查目标节点本地标志，导致隐藏/禁用祖先下的 child
    仍可能进入更新队列语义。
