- id: AD-020
  title: Graphics state stack and clip-transform command snapshot
  contract: M1 Graphics state 必须支持 push/pop scoped nesting，clip 与 transform composition
    必须在命令层可重复验证
  evolution_kind: parity
  milestone_id: M1
  priority: high
  status: verified
  parent_id: 
  evidence:
  - novadraw-render/src/context.rs
  - novadraw-render/src/command.rs
  - novadraw-render/src/backend/vello/mod.rs
  - agent/draw2d-core-milestones.yaml
  - agent/goal-roadmap.md
  progress_notes:
  - Root Cause：`NdCanvas` 只生成 `PushState/RestoreState/PopState` 命令但不维护 Graphics 状态，`clip_depth()`
    恒为 0，`set_transform/reset_transform` 也被编码为 concat；因此 M1 的 state stack nesting
    与 clip/transform command snapshot 无法在命令层稳定验证
  - 新增 `GraphicsState` 与 `state_stack`，让 `NdCanvas` 在命令生成层维护 fill/stroke/line/transform/clip_depth
    状态
  - 新增 `RenderCommandKind::SetTransform`、`ResetTransform`、`ResetClip`，使替换 transform
    和清空 clip 不再伪装成 concat/no-op
  - 修正 Vello backend 状态解释：RenderState 记录 clip_depth，PushState 不重复推 clip；RestoreState/PopState
    根据 depth 差弹出 clip layer；ResetClip 弹出当前全部 clip layer
  - 新增 3 个 M1 契约测试：Graphics state stack nesting、set/reset transform snapshot、clip
    reset/restore command snapshot
  - 验证通过：cargo fmt --check、cargo test -p novadraw-render、cargo check --workspace
  done_when:
  - "`NdCanvas::push_state` / `restore_state` / `pop_state` 能恢复 Graphics 状态并维护 clip
    depth"
  - "`set_transform` 与 `reset_transform` 输出可区分的 snapshot 命令，而不是继续输出 concat"
  - "`reset_clip` 输出命令并重置命令层 clip depth"
  - Vello backend 能解释新增命令并按 clip depth 恢复 scene layer
  - 新增测试覆盖 state stack nesting 与 clip-transform command snapshot
  - cargo fmt --check、cargo test -p novadraw-render、cargo check --workspace 通过
- id: AD-021
  title: Seal mutable render command escape hatch
  contract: NdCanvas 内部 Graphics 状态与命令流必须保持一致；外部不能直接可变访问命令 Vec 绕过状态机
  evolution_kind: architecture
  milestone_id: M1
  priority: high
  status: verified
  parent_id: AD-020
  evidence:
  - novadraw-render/src/context.rs
  progress_notes:
  - Root Cause：AD-020 后 `NdCanvas` 开始维护内部 GraphicsState；公开的 `commands_mut()` 会允许外部直接改写命令流，却不同步内部
    state/clip_depth/transform，破坏录制回放与后端替换所依赖的命令流一致性
  - 调用面审计显示 `commands_mut()` 只有定义自身，没有跨 crate 或 crate 内调用
  - 先尝试收窄为 `pub(crate)`，验证出现 dead_code warning；最终直接移除该逃生口
  - 外部只保留 `commands()` 只读快照与 `to_submission()` 录制回放出口
  - 验证通过：cargo fmt --check、cargo test -p novadraw-render、cargo check --workspace
  done_when:
  - "`NdCanvas` 不再暴露可变命令 Vec 访问器"
  - 外部只能通过 Graphics API 生成命令，或通过只读命令快照/RenderSubmission 读取录制结果
  - cargo fmt --check、cargo test -p novadraw-render、cargo check --workspace 通过且无新增
    warning
- id: AD-022
  title: Geometry missing types foundation
  contract: M1 geometry substrate must expose Dimension, PointList, and precision
    comparison primitives as platform-independent value types
  evolution_kind: parity
  milestone_id: M1
  priority: high
  status: verified
  parent_id: 
  evidence:
  - novadraw-geometry/src/rect.rs
  - novadraw-geometry/src/point_list.rs
  - novadraw-geometry/src/precision.rs
  - novadraw-geometry/src/lib.rs
  - agent/goal-roadmap.md
  progress_notes:
  - Root Cause：M1 SSOT 要求 Point、Dimension、Rectangle、Insets、PointList、precision geometry
    与 Transform；现有 geometry 只有 Size、Point、Rectangle、Insets、Transform，缺少正式 Dimension
    命名、PointList 与统一 precision primitive
  - 将正式尺寸类型提升为 `Dimension`，保留 `Size` 作为兼容别名，避免破坏现有调用点
  - 新增 `PointList`，封装点序列并提供 bounds、transform、Translatable、iterator 与 serde 语义
  - 新增 `Precision`、`DEFAULT_EPSILON` 和 `ApproxEq`，覆盖 f64、Point、Rectangle、Transform
    的近似比较
  - 新增 geometry 单元测试覆盖 PointList bounds / empty / translate-scale / transform，以及 Precision
    eq / snap_zero / ApproxEq
  - 验证通过：cargo fmt --check、cargo test -p novadraw-geometry、cargo check --workspace
  done_when:
  - "`novadraw_geometry::Dimension` 可作为正式尺寸类型导出，`Size` 保持兼容"
  - "`novadraw_geometry::PointList` 可表示点序列并支持 bounds、transform、Translatable 与迭代"
  - "`novadraw_geometry::Precision` 与 `ApproxEq` 可为核心几何类型提供确定性近似比较"
  - 相关 geometry 单元测试覆盖新增语义
  - cargo fmt --check、cargo test -p novadraw-geometry、cargo check --workspace 通过
- id: WF-002
  title: Backlog manifest split
  contract: 持续工作流 backlog 必须拆分为热路径 manifest/index/active 与冷历史 archive，避免 Agent 每轮读取历史噪音污染上下文
  evolution_kind: workflow
  priority: high
  status: verified
  parent_id: M0
  evidence:
  - agent/outer-loop-delta-backlog.yaml
  - agent/backlog/schema.yaml
  - agent/backlog/index.yaml
  - agent/backlog/active.yaml
  - agent/backlog/candidates.yaml
  - agent/backlog/baseline-debts.yaml
  - agent/backlog/archive/2026-06.yaml
  - agent/workflow-doctor.rb
  progress_notes:
  - Root Cause：`agent/outer-loop-delta-backlog.yaml` 增长到约 1000 行，混合规则、债务、candidate、正式
    delta 与历史记录；Agent 每轮读取完整文件会把冷历史和旧路径证据带入上下文，影响当前决策。
  - 将 `outer-loop-delta-backlog.yaml` 降级为 manifest，只保留 schema/index/active/candidates/debts/archive
    入口。
  - 新增 `agent/backlog/schema.yaml` 保存状态定义、选择规则、强制门禁和 milestone policy。
  - 新增 `agent/backlog/index.yaml` 作为热路径读取入口；新增 `active.yaml` 保存近期/当前 delta；新增
    `candidates.yaml` 和 `baseline-debts.yaml` 分别管理候选项与基线债务。
  - 将历史 CAD/AD 移入 `agent/backlog/archive/2026-06.yaml`，只在审计、追溯或冲突排查时读取。
  - 更新 `workflow-doctor.rb`，通过 manifest 聚合 active/candidates/archive/debts 并继续校验 ID 唯一性、状态合法性、milestone_id
    与 checkpoint current delta。
  - 验证通过：ruby agent/workflow-doctor.rb、YAML parse、git diff --check。
  done_when:
  - "`agent/outer-loop-delta-backlog.yaml` 不再承载完整 backlog，只作为 manifest"
  - "Agent 默认恢复工作只需读取 `agent/backlog/index.yaml` 与 `agent/backlog/active.yaml`"
  - "历史 done/verified/rejected/promoted 条目进入 archive，不在热路径默认读取"
  - "baseline debt、candidate、schema 独立成文件"
  - "`workflow-doctor.rb` 能跨 manifest 指向的多文件检查 ID 唯一性、状态合法性、milestone_id 与 checkpoint current delta"
- id: AD-023
  title: Graphics text image alpha command support
  contract: M1 Graphics API must record text, image, and alpha semantics into replayable backend-independent commands
  evolution_kind: parity
  milestone_id: M1
  priority: high
  status: verified
  parent_id: null
  evidence:
  - novadraw-render/src/context.rs
  - novadraw-render/src/command.rs
  - agent/backlog/active.yaml
  - agent/goal-roadmap.md
  progress_notes:
  - Root Cause：M1 要求 Graphics draw/fill/text/image/clip/transform/state stack 与 alpha 状态；`NdCanvas`
    虽已有 `font`、`fill_text`、`stroke_text`、`draw_image`、`global_alpha` API，但这些入口仍是 no-op 或不进入命令流，导致录制回放与后端替换无法验证 text/image/alpha 语义。
  - "`GraphicsState` 新增 font、font_size、global_alpha，并随 push/restore/pop 一起作用域化。"
  - "`RenderCommandKind` 新增 `SetGlobalAlpha`；`FillText` / `StrokeText` 携带 font、font_size、color；`Image` 携带 alpha。"
  - "`NdCanvas::fill_text` / `stroke_text` / `draw_image` / `draw_image_with_size` / `global_alpha` 现在产生可回放命令。"
  - 形状、路径、文字命令在录制时应用当前 global alpha；透明 alpha 会跳过文字和图像命令。
  - 新增 render 单元测试覆盖 alpha 作用域、text snapshot、image destination/alpha snapshot、measure_text 字体大小语义。
  - 验证通过：cargo fmt --check、cargo test -p novadraw-render、cargo check --workspace、cargo check -p
    novadraw-render --features vello。
  done_when:
  - "`NdCanvas::global_alpha` 进入 Graphics state，并输出可回放的 `SetGlobalAlpha` 命令"
  - "`fill_text` / `stroke_text` 生成携带 font、font_size、color 的命令"
  - "`draw_image` / `draw_image_with_size` 生成携带 dest_rect、src_rect、alpha 的命令"
  - "push/restore/pop 能恢复 font 与 alpha 状态"
  - "新增单元测试覆盖 text/image/alpha command snapshot"
  - "cargo fmt --check、cargo test -p novadraw-render、cargo check --workspace、cargo check -p novadraw-render --features vello 通过"
