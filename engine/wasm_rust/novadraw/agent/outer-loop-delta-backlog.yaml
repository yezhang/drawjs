    progress_notes:
      - 根因分析：collect_parent_chain_steps 中 offset=0 是全绝对坐标模型的直接推论，不是 bug
      - Draw2D 的 dirty rect 是 figure-local（需要 translate），Novadraw 的 dirty rect 是绝对坐标（只需 intersect）
      - 最小修复：更新 repair.rs 文件头注释，显式记录 offset=0 设计决策
      - 新增 collect_parent_chain_steps_with_offset()，为 figure-local dirty 模型预留
