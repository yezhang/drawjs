      - 能写出清晰的 done_when
      - 问题不是 AD-001 的重复项
    reject_when:
      - 只是命名层面问题
      - 不能落到具体职责边界或可验证行为
    notes:
      - 已提升并扩展为 AD-006，范围从 update listener 扩展到 notification foundation
      - 不再保留为候选条目，避免与正式 backlog 重复

  - id: CAD-002
    title: FigureGraph and FigureBlock public mutation surface audit
    contract: "FigureGraph 持有树关系和图级状态；FigureBlock 只是节点运行时状态容器"
    evolution_kind: architecture
    priority: high
    status: promoted
    evidence:
      - novadraw-scene/src/scene/mod.rs
      - novadraw-scene/src/lib.rs
    promote_when:
      - "确认 `FigureGraph.blocks` / `uuid_map` 公开字段允许外部绕过图级不变量"
      - "确认 `FigureBlock` 公开字段或方法允许绕过 parent/children、selection、bounds、update/dirty 协议"
    reject_when:
      - 公开面仅限 crate 内部且无法从外部破坏不变量
    notes:
      - "Completion audit 发现 `FigureGraph` 公开 `blocks` / `uuid_map`"
      - "`FigureBlock::add_child()` 只追加 children，不维护 child parent 或 update/dirty 协议"
      - "`FigureBlock::set_bounds()` 可直接改内部 Figure bounds，不经过 FigureGraph / UpdateManager"
      - "REVIEW 结论：问题真实存在，但原范围过大；先提升为 AD-011，只处理 `FigureGraph.blocks` / `uuid_map` 公开存储面，FigureBlock 字段/方法收窄留作后续评估"

  - id: CAD-003
    title: Editor interaction hot-path logging cleanup
    contract: "event dispatch、hit-test、render 等高频路径默认不打印运行时日志"
    evolution_kind: architecture
    priority: medium
    status: promoted
    evidence:
      - apps/editor/src/system.rs
      - apps/editor/src/app_window.rs
      - apps/editor/src/scene_manager/interactive_figure.rs
    promote_when:
      - "确认 editor 鼠标移动、entered、exited 或平台输入路径仍默认打印运行时日志"
      - 清理不改变事件语义、坐标转换或交互状态写入
    reject_when:
      - 这些日志已被 debug feature 或测试专用路径隔离
    notes:
      - "Completion audit 发现 editor 层 mouse move / raw pointer / enter / exit 路径仍有 `tracing::info!`"
      - "REVIEW 结论：问题真实存在，且不重复 AD-008；AD-008 清理 engine event/hit-test，本项处理 editor 默认交互路径日志"

  - id: CAD-004
    title: Composition root residual public read surface audit
    contract: "NovadrawSystem 是组合根；app_window 只做平台输入适配"
    evolution_kind: architecture
    priority: medium
    status: promoted
    evidence:
      - apps/editor/src/system.rs
      - apps/editor/src/app_window.rs
    promote_when:
      - "确认 `WinitNovadrawSystem::scene_manager()` 只读逃生口让 app_window 依赖组合根内部结构"
      - "确认 app_window 直接引用 `EditorInteractionCore::logical_from_raw` 泄漏内部实现边界"
    reject_when:
      - 只读访问被证明是稳定 public query API，且不暴露内部结构
    notes:
      - "建议评估是否改为 `current_scene()`、`is_scene()` 或独立 platform input adapter"
      - render strategy wiring 也可能属于相邻候选，但应避免与本项混在同一 delta
      - "REVIEW 结论：问题真实存在。`app_window` 仍通过 `system.scene_manager().current_scene` 依赖组合根内部 `SceneManager`，并直接调用 `EditorInteractionCore::logical_from_raw` 复用内部输入转换 helper"
      - "提升为 AD-014；本轮只处理组合根只读面和平台输入适配边界，不混入 CAD-005 文档清扫或 CAD-006 PendingMutation 生产边界"

  - id: CAD-005
    title: Ideal architecture stale composition-root document cleanup
    contract: "理想架构文档、契约、coverage 与代码现状一致"
    evolution_kind: architecture
    priority: medium
    status: promoted
    evidence:
      - doc/理想架构设计.md
      - agent/governance-contract-coverage.md
    promote_when:
      - "确认文档仍把 NovadrawSystem trait 描述为持有或暴露 scene/update_manager/dispatcher"
      - 确认文档对当前实现对比表与 AD-010 后现状冲突
    reject_when:
      - 相关段落已经全部同步为组合根内部装配与命名动作
    notes:
      - Completion audit 发现理想架构文档早期章节仍有旧组合根表述
      - "REVIEW 结论：问题真实存在。`doc/理想架构设计.md` 仍把 NovadrawSystem trait 描述为持有 `scene/update_manager/dispatcher/scene_host`，并在多处保留 `NovadrawSystem.update_manager` / `NovadrawSystem.dispatcher` 与 `WinitEventDispatcher` 旧平台入口表述"
      - "提升为 AD-015；本轮只清理理想架构文档中的组合根公开面和平台输入旧命名，不处理 CAD-006 PendingMutation 生产边界"

  - id: CAD-006
    title: PendingMutation production boundary audit
    contract: "结构性变更必须通过 PendingMutation 延迟应用，且生产阶段边界清晰"
    evolution_kind: architecture
    priority: medium
    status: promoted
    evidence:
      - novadraw-scene/src/mutation/mod.rs
      - novadraw-scene/src/scene/mod.rs
      - novadraw-scene/src/context/mod.rs
    promote_when:
      - "确认 `PendingMutations` 普通队列无法区分 dispatch 中 enqueue 与非 dispatch enqueue"
      - "确认 `PendingMutation::AddChild` 携带既有 child id 会暴露低层图操作能力"
    reject_when:
      - 现有 API 被证明只在受控上下文中构造，且公开能力不破坏 C-08 时序
    notes:
      - Completion audit 未发现主路径时序破坏，但发现类型层面仍有可审计空间
      - "REVIEW 结论：问题真实存在。`PendingMutation` / `PendingMutations::enqueue` / `MutationContext` 曾作为公开构造与 enqueue 面暴露，`apply_pending_mutations` 接收任意 `Vec<PendingMutation>`，且 `PendingMutation::AddChild { child: BlockId }` 允许携带既有节点 ID 附加到底层图结构"
      - "提升为 AD-016；本轮只收敛 PendingMutation 类型边界，不改变 dispatch 后 apply 的运行时事务顺序"

  - id: CAD-007
    title: FigureBlock public mutation surface audit
    contract: "FigureBlock 是节点运行时状态容器；公开方法不能绕过 FigureGraph 图级不变量"
    evolution_kind: architecture
    priority: high
    status: promoted
    parent_id: AD-011
