      - /Users/bytedance/Documents/code/GitHub/gef-classic/org.eclipse.draw2d/src/org/eclipse/draw2d/ScrollPane.java
      - novadraw-scene/src/viewport.rs
      - novadraw-scene/src/figure/mod.rs
      - novadraw-scene/src/scene/mod.rs
      - novadraw-scene/src/update/repair.rs
    promote_when:
