      - novadraw-scene/src/update/repair.rs
      - doc/02-figure/figure_bounds.md
      - doc/02-figure/figure_tree_position.md
      - doc/04-coordinates/coordinates.md
      - org.eclipse.draw2d/src/org/eclipse/draw2d/Figure.java
    progress_notes:
      - 当前仓库对 bounds 存在“局部坐标”与“相对坐标根绝对坐标”两套并存描述
