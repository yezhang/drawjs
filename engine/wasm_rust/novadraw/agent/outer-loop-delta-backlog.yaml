      - 验证通过：cargo check ✅，13/13 repair tests ✅
      - 持续工作流 review 复核：repair.rs 已按 draw2d 父链 repairDamage 协议传播 dirty，SceneUpdateManager 只持有 dirty queue 与 update phase；cargo test -p novadraw-scene update::repair 14/14 ✅
    done_when:
