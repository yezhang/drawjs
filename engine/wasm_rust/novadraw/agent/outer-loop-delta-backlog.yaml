  - id: AD-001B
    title: UpdateManager repair boundary audit
    contract: "UpdateManager 在 repair phase 中不持有不必要的图级语义"
    evolution_kind: architecture
    priority: high
    status: verified
    parent_id: AD-001
    split_into: []
