version: 1
last_updated: "2026-06-10"

selection_rules:
  - 先处理职责边界错误，再处理实现细节
  - 先处理高优先级 delta，再处理中低优先级 delta
  - 单轮只允许选择一个 delta
  - 如果 delta 需要跨多个子系统，先拆分
  - 新问题默认先作为 candidate，评估后再进入正式 backlog
  - 默认只主动推进 evolution_kind 为 architecture 或 parity 的条目

evolution_kind_definitions:
  architecture: 理想架构收敛项，处理职责边界、状态归属、协议时序和依赖方向
  parity: 为实现 g2 等价语义必须补齐的能力缺口
  new_feature: 超出当前理想架构 / g2 等价目标的新能力，默认不进入主线

hard_gates:
  force_split_when:
    - 同一 delta 连续 2 轮仍未明显收敛
    - Post-Execution Reflection 出现 2 个或以上独立子问题
    - Next Step 已分叉成多个独立职责边界问题
  return_to_outer_loop_when:
    - 当前 delta 已触发 split
    - backlog 优先级可能失真
    - baseline_verification 失败主要来自仓库既有问题
    - checkpoint 或 worklog 已明确写出需要先整理 backlog

status_definitions:
  candidate: 已发现但尚未进入正式 backlog
  rejected: 已评估但当前不值得进入 backlog
  pending: 已进入正式 backlog，等待执行
  proposed: 已完成根因分析，待实施
  in_progress: 正在执行
  split: 已拆分成多个更小的 delta
  blocked: 暂时无法推进
  verified: 已通过验证
  done: 已完成并回写状态

verification_definitions:
  delta_verification: 当前 delta 相关的最小验证，必须通过
  baseline_verification: 全仓校验，可因既有问题失败，但必须登记基线债务

baseline_debts:
  - id: BASELINE-001
    title: Repository-wide formatting drift
    status: resolved
    impact: medium
    evidence:
      - ./agent/workflow-verify.sh
      - cargo fmt --check
    notes:
      - 全仓存在本轮未修改文件的格式化漂移
      - 当前允许 delta_verification 通过后继续推进，但不能忽略该债务
      - "2026-06-09：本轮执行 `cargo fmt` 后 `cargo fmt --check` 通过，格式化漂移已收敛"

candidate_items:
