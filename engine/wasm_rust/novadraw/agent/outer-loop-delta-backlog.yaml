      - "REVIEW 结论：问题真实存在，应提升为 AD-012；先收窄 FigureBlock 公开可变面与导出面，不同时重构 render/event/layout 内部遍历"

  - id: CAD-008
    title: PendingMutation reparent cycle invariant audit
    contract: "结构性变更必须通过 PendingMutation 延迟应用，且 apply 阶段必须维护 FigureGraph 树不变量"
    evolution_kind: architecture
    priority: high
    status: promoted
    evidence:
