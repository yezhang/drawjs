version: 1
last_updated: "2026-04-23"

selection_rules:
  - 先处理职责边界错误，再处理实现细节
  - 先处理高优先级 delta，再处理中低优先级 delta
  - 单轮只允许选择一个 delta
  - 如果 delta 需要跨多个子系统，先拆分
  - 新问题默认先作为 candidate，评估后再进入正式 backlog
  - 默认只主动推进 evolution_kind 为 architecture 或 parity 的条目

evolution_kind_definitions:
  architecture: 理想架构收敛项，处理职责边界、状态归属、协议时序和依赖方向
  parity: 为实现 g2 等价语义必须补齐的能力缺口
  new_feature: 超出当前理想架构 / g2 等价目标的新能力，默认不进入主线

hard_gates:
  force_split_when:
    - 同一 delta 连续 2 轮仍未明显收敛
    - Post-Execution Reflection 出现 2 个或以上独立子问题
    - Next Step 已分叉成多个独立职责边界问题
  return_to_outer_loop_when:
    - 当前 delta 已触发 split
    - backlog 优先级可能失真
    - baseline_verification 失败主要来自仓库既有问题
    - checkpoint 或 worklog 已明确写出需要先整理 backlog

status_definitions:
  candidate: 已发现但尚未进入正式 backlog
  rejected: 已评估但当前不值得进入 backlog
  pending: 已进入正式 backlog，等待执行
  proposed: 已完成根因分析，待实施
  in_progress: 正在执行
  split: 已拆分成多个更小的 delta
  blocked: 暂时无法推进
  verified: 已通过验证
  done: 已完成并回写状态

verification_definitions:
  delta_verification: 当前 delta 相关的最小验证，必须通过
  baseline_verification: 全仓校验，可因既有问题失败，但必须登记基线债务

baseline_debts:
  - id: BASELINE-001
    title: Repository-wide formatting drift
    status: open
    impact: medium
    evidence:
      - ./agent/workflow-verify.sh
      - cargo fmt --check
    notes:
      - 全仓存在本轮未修改文件的格式化漂移
      - 当前允许 delta_verification 通过后继续推进，但不能忽略该债务

candidate_items:
  - id: CAD-001
    title: Update listener responsibility audit
    contract: "更新监听器只承担监听语义，不吞并编排或图状态职责"
    evolution_kind: architecture
    priority: medium
    status: candidate
    evidence:
      - novadraw-scene/src/update/listener.rs
      - novadraw-scene/src/update/mod.rs
    promote_when:
      - 能明确指出监听器与 UpdateManager 的边界偏差
      - 能写出清晰的 done_when
      - 问题不是 AD-001 的重复项
    reject_when:
      - 只是命名层面问题
      - 不能落到具体职责边界或可验证行为

items:
  - id: AD-001
    title: UpdateManager boundary audit
    contract: "UpdateManager 只负责两阶段更新编排，不拥有图级语义"
    evolution_kind: architecture
    priority: high
    status: in_progress
    parent_id: null
    split_into: []
    verification_scope:
      delta_verification:
        - cargo check
        - cargo test -p novadraw-scene
      baseline_verification:
        - ./agent/workflow-verify.sh
    baseline_debt_refs:
      - BASELINE-001
    evidence:
      - novadraw-scene/src/update/mod.rs
      - novadraw-scene/src/update/deferred.rs
      - apps/editor/src/system.rs
    progress_notes:
      - 已将 validation 阶段中的图级语义从 SceneUpdateManager 回收到 FigureGraph
      - UpdateManager 新增 invalid queue drain 接口，仅保留 phase 触发与队列所有权
      - repair phase 与 system 调度样板仍待继续审计
      - 若下一轮继续出现 repair 与 scheduling 双分叉，应将该条目转为 split
    done_when:
      - 明确哪些职责应保留在 UpdateManager，哪些应回归 FigureGraph 或组合根
      - 如需调整接口，调用点可以编译通过
      - 相关测试通过

  - id: AD-002
    title: SceneHost thin boundary audit
    contract: "SceneHost 是极薄平台调度层"
    evolution_kind: architecture
    priority: high
    status: pending
    evidence:
      - apps/editor/src/scene_manager/scene_host.rs
      - apps/editor/src/system.rs
    done_when:
      - 明确 SceneHost 的最小职责集
      - 平台细节与业务规则边界清晰
      - 调用链保持可编译

  - id: AD-003
    title: PendingMutation timing audit
    contract: "结构性变更必须通过 PendingMutation 在正确时机应用"
    evolution_kind: architecture
    priority: high
    status: pending
    evidence:
      - novadraw-scene/src/mutation/mod.rs
      - apps/editor/src/system.rs
      - doc/理想架构设计.md
    done_when:
      - 应用时机与理想架构一致
      - 分发期间不直接破坏图结构
      - 相关验证通过

  - id: AD-004
    title: NovadrawSystem composition root audit
    contract: "NovadrawSystem 是组合根"
    evolution_kind: architecture
    priority: medium
    status: pending
    evidence:
      - novadraw/src/lib.rs
      - apps/editor/src/system.rs
    done_when:
      - 组合根职责清晰
      - 子系统依赖方向稳定
      - 无额外全局状态引入

  - id: AD-005
    title: Interaction state ownership audit
    contract: "交互状态应归属 FigureGraph"
    evolution_kind: architecture
    priority: medium
    status: pending
    evidence:
      - novadraw-scene/src/event/mod.rs
      - apps/editor/src/system.rs
      - doc/理想架构设计.md
    done_when:
      - hover/focus/capture 等状态归属明确
      - 事件分发与状态持有边界清晰
      - 行为验证通过
