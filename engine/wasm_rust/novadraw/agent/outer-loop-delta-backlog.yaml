      - novadraw-scene/src/context/mod.rs
      - novadraw-scene/src/mutation/mod.rs
      - novadraw-scene/src/scene/update_integration_test.rs
    promote_when:
      - "确认 `apply_reparent_mutation` 只校验 old_parent/new_parent 存在，但未拒绝 `child == new_parent` 或 `new_parent` 位于 child 子树"
      - "确认自定义 Figure 可通过 `NovadrawContext::reparent_later()` 申请这种结构变更"
    reject_when:
      - "已有统一祖先链校验能证明 reparent 不会形成环"
    notes:
      - "Discovery 结论：问题真实存在。当前 `apply_reparent_mutation` 在 detach/attach 前已校验目标存在性，但未校验防环；把 child reparent 到自身子孙会破坏树结构不变量"
      - "提升为 AD-017；本轮只处理 reparent 防环和回归测试，不混入 `EditorInteractionCore::scene_manager_mut()` 内部逃生口或 `FigureGraph::get_block()` 只读 API 收敛"

  - id: CAD-009
    title: Viewport and ScrollPane Figure-tree integration
    contract: "Viewport/ScrollPane 属于 draw2d Figure 级组件，应通过 Figure 树父链坐标协议接入 render / hit-test / damage repair"
    evolution_kind: parity
    priority: high
    status: promoted
    evidence:
