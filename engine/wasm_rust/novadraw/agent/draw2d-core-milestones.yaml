version: 1
last_updated: "2026-06-11"

purpose: >
  Track the Draw2D core capability milestones that guide Novadraw toward its
  initial project goal. These milestones intentionally exclude GEF framework
  capabilities such as EditPart, EditPolicy, Tool, Command, Request, and Viewer.

source_of_truth:
  - doc/01-architecture/draw2d_design_axioms.md
  - doc/01-architecture/draw2d_api_coverage.md
  - doc/01-architecture/draw2d_notification_design.md
  - doc/01-architecture/ideal-architecture-static.md
  - doc/01-architecture/ideal-architecture-dynamic.md
  - /Users/bytedance/Documents/code/GitHub/gef-classic/org.eclipse.draw2d

companion_views:
  api_semantic_view: doc/01-architecture/draw2d_api_coverage.md
  product_view: doc/06-roadmap/product-deliverables.md
  demo_view: doc/06-roadmap/demo-matrix.md
  status_snapshot: agent/goal-roadmap.md
  view_index: doc/06-roadmap/00-index.md

milestone_id_authority: >
  This file is the single source of truth for milestone identifiers (M1-M10).
  Companion views must reference milestone ids defined here and must not invent
  their own numbering. Any delta, PR, or commit referring to "M{n}" refers to
  the M{n} defined in this YAML.

status_definitions:
  not_started: Milestone has not been planned into concrete deltas.
  in_progress: At least one delta is actively moving the milestone forward.
  contract_aligned: Public contracts and architecture boundaries are aligned.
  behavior_verified: Core behavior is covered by repeatable probes or tests.
  complete: Contract, behavior, documentation, and workflow coverage are complete.

completion_rules:
  - A milestone can only move to behavior_verified after its contract probes pass.
  - A milestone can only move to behavior_verified after its primary api_semantics are checked against doc/01-architecture/draw2d_api_coverage.md.
  - A milestone can only move to complete after documentation and debt entries are reconciled.
  - Any delta that moves a milestone forward must state which api_semantics are affected and whether the semantic contract remains complete.
  - A delta must reference milestone_id unless it is pure workflow maintenance or baseline debt cleanup.
  - GEF-specific work must not be attached to these milestones.
  - M1-M5 core mechanism gates are evaluated against the active core Figure surface only: RootFigure, RectangleFigure, and test mock Figures.
  - Existing deferred Figure implementations remain exported but are not counted as M1-M5 completion gates; ViewportFigure belongs to M8, reusable builtin figures belong to M10.
  - Any generic Figure mechanism or API semantic must cover every Figure in the active surface; deferred Figures must reach the same protocol coverage before being counted as their own milestone progress.

bootstrap:
  id: M0
  title: 目标与验收框架
  type: workflow_prerequisite
  status: in_progress
  goal: >
    Make the Draw2D core target auditable by defining milestone tracking,
    completion gates, workflow doctor checks, and debt classification.
  scope:
    - Milestone registry
    - Completion state model
    - Workflow doctor inputs
    - Baseline debt and paused debt classification
  done_when:
    - Each milestone has goal, scope, non_scope, contracts, probes, and dependencies.
    - Workflow checks can detect inconsistent milestone, backlog, checkpoint, and debt states.
    - Completion audit distinguishes architecture completion from Draw2D core completion.

milestones:
  - id: M1
    title: 几何与 Graphics 基础
    layer: Foundation
    status: complete
    goal: >
      Establish the geometry and drawing substrate required by all higher-level
      Draw2D protocols.
    scope:
      - Point, Dimension, Rectangle, Insets, PointList, precision geometry, and Transform
      - Graphics draw, fill, text, image, clip, translate, scale, and state stack
      - Stroke, fill, alpha, line cap, line join, and color state
    non_scope:
      - Figure tree semantics
      - Event dispatch
      - Layout manager algorithms
    contracts:
      - Geometry values must remain platform-independent.
      - Graphics state must be push/pop scoped and nest safely.
      - Clip and transform composition must be deterministic.
    probes:
      - Geometry operation unit tests
      - Graphics state stack nesting tests
      - Clip and transform command snapshots
    api_semantics:
      primary:
        - geometry.primitives
        - graphics.context
      secondary:
        - paint.protocol
        - clipping.strategy
    dependencies: []
    enables:
      - M2
      - M3

  - id: M2
    title: Figure 树与盒模型
    layer: Figure Runtime
    status: complete
    goal: >
      Implement the lightweight Figure tree as the single runtime backbone for
      ownership, z-order, visibility, coordinates, validation, and hit testing.
    scope:
      - Figure, FigureBlock, and FigureGraph roles
      - Active core Figure surface: RootFigure, RectangleFigure, and test mock Figures
      - Parent and children topology
      - Bounds, insets, clientArea, visible, enabled, and z-order
      - Tree add, remove, and reparent invariants
      - addNotify/removeNotify equivalent lifecycle hooks
    non_scope:
      - Full layout algorithm set
      - Full event state machine
      - Reserved extension semantics
      - Deferred reusable/builtin Figure parity beyond the active core surface
    contracts:
      - Draw2D A1 lightweight Figure tree axiom
      - Draw2D A2 tree as runtime backbone axiom
      - Draw2D A3 bounds unified geometry axiom
      - Draw2D A5 clientArea box model axiom
    probes:
      - Add, remove, and reparent no-cycle tests
      - Child order and z-order tests
      - Bounds, insets, and clientArea consistency tests
      - Visible and enabled propagation tests
    api_semantics:
      primary:
        - figure.tree
        - figure.lifecycle
        - figure.geometry.bounds
        - figure.box.client_area
        - figure.visibility.enabled
      secondary:
        - hit_test.search
        - coordinate.conversion
        - notification.ancestor
    dependencies:
      - M1
    enables:
      - M3
      - M4
      - M6

  - id: M3
    title: 绘制遍历与裁剪闭环
    layer: Figure Runtime
    status: complete
    goal: >
      Align rendering traversal with Draw2D Figure paint template semantics and
      make clipping consistent with the Figure tree.
    scope:
      - paint -> paintFigure -> paintClientArea/children -> paintBorder order
      - Parent clientArea clip and child bounds clip
      - Draw2D-equivalent child clipping strategy override
      - Active core Figure surface clipping and border protocol coverage
      - Hit-test visible area consistency with paint clipping
    non_scope:
      - Iterative render implementation and render-mode switching
      - Backend-specific performance tuning
      - Full widget library
      - Deferred reusable/builtin Figure visual parity
      - GEF feedback or handles
    contracts:
      - Children must be clipped by parent clientArea and child bounds.
      - Border painting must occur after figure and children painting.
      - Hit testing must not contradict painted visibility.
    probes:
      - Nested clipping rendering tests
      - Border and insets rendering tests
      - Paint versus hit-test consistency tests
    api_semantics:
      primary:
        - paint.protocol
        - graphics.context
        - clipping.strategy
        - border.protocol
        - hit_test.search
      secondary:
        - figure.box.client_area
        - coordinate.conversion
        - damage.repaint
    dependencies:
      - M1
      - M2
    enables:
      - M4
      - M5
      - M8

  - id: M4
    title: 坐标域与变换闭环
    layer: Figure Runtime
    status: in_progress
    goal: >
      Complete the Draw2D coordinate-domain model, including coordinate roots,
      parent conversion, absolute conversion, and event point reduction.
    scope:
      - useLocalCoordinates and isCoordinateSystem
      - translateToParent and translateFromParent
      - translateToAbsolute and translateToRelative
      - Insets-aware clientArea origin
      - Entry-domain to target-domain input points
    non_scope:
      - Reserved extension UI
      - Zoom policy
      - Connection routing
    contracts:
      - Draw2D A4 local coordinates and coordinate root axiom
      - Bounds, insets, and clientArea origin must share one conversion protocol.
      - Callers must not manually compose parent offsets outside the coordinate API.
    probes:
      - Deep nested coordinate conversion tests
      - Coordinate root movement tests
      - Event point reduction tests
      - Dirty rect parent-chain coordinate propagation tests
    api_semantics:
      primary:
        - coordinate.conversion
        - figure.box.client_area
        - event.point_reduction
      secondary:
        - hit_test.search
        - damage.repaint
        - viewport.scroll_zoom
    dependencies:
      - M2
      - M3
    enables:
      - M5
      - M6
      - M8
      - M9

  - id: M5
    title: Layout + Validation + UpdateManager
    layer: Figure Runtime
    status: not_started
    goal: >
      Implement Draw2D layout delegation and the two-phase update transaction:
      Validation before Damage Repair.
    scope:
      - LayoutManager trait and constraints
      - Preferred, minimum, and maximum size
      - invalidate, revalidate, validate, and validation roots
      - Invalid figure queue
      - Dirty region collection and damage repair
      - UpdateManager update phase notifications
    non_scope:
      - Completing every Draw2D layout algorithm in one step
      - Reserved extension policy
      - GEF command stack
    contracts:
      - Draw2D A6 geometry change protocol axiom
      - Draw2D A7 two-phase update transaction axiom
      - Draw2D A8 parent-chain damage repair axiom
      - Validation must always precede damage repair.
    probes:
      - Layout invalidation tests
      - Dirty region union and clipping tests
      - Validation-then-repair ordering tests
      - Reentrant invalidation convergence tests
    api_semantics:
      primary:
        - layout.manager
        - validation.protocol
        - update_manager.two_phase
        - damage.repaint
      secondary:
        - figure.geometry.bounds
        - figure.box.client_area
        - notification.layout_update
    dependencies:
      - M3
      - M4
    enables:
      - M7
      - M8
      - M9

  - id: M6
    title: 事件分发与交互状态机
    layer: Figure Runtime
    status: not_started
    goal: >
      Implement Draw2D input dispatch without introducing GEF tool or edit
      policy concepts.
    scope:
      - Mouse target
      - Capture
      - Focus owner
      - Hover, enter, and exit
      - Mouse press, release, move, wheel, key press, and key release
      - Figure-level input callback/listener endpoints
    non_scope:
      - GEF Tool
      - GEF SelectionTool
      - GEF EditPolicy
      - GEF Request
    contracts:
      - Draw2D A9 event dispatcher state machine axiom
      - Platform input adapters must not own Draw2D semantics.
      - Figure callbacks receive target-domain events.
    probes:
      - Capture keeps receiving events after pointer leaves the figure
      - Enter and exit transition tests
      - Focus keyboard routing tests
      - Z-order hit-test tests
    api_semantics:
      primary:
        - event.dispatcher
        - event.input_listeners
        - event.focus
        - hit_test.search
        - event.point_reduction
      secondary:
        - coordinate.conversion
        - figure.visibility.enabled
    dependencies:
      - M2
      - M4
    enables:
      - M7
      - M10

  - id: M7
    title: 通知语义分层
    layer: Figure Runtime
    status: not_started
    goal: >
      Preserve Draw2D's layered notification semantics without collapsing them
      into a single generic event bus.
    scope:
      - Figure moved notification
      - Coordinate system changed notification
      - Property changed notification
      - Ancestor added, removed, and moved notification
      - Layout lifecycle notification
      - UpdateManager validating and painting notification
    non_scope:
      - Universal event bus
      - GEF selection provider
      - Application-level message bus
    contracts:
      - Geometry change and coordinate-system change must be distinct.
      - Input callbacks and object state notifications must remain separate.
      - Update transaction notifications belong to UpdateManager or SceneHost boundaries.
    probes:
      - Bounds change triggers figure moved
      - Coordinate root movement triggers coordinate system changed
      - Parent-chain changes trigger ancestor notifications
      - UpdateManager emits validating and painting phase notifications
    api_semantics:
      primary:
        - notification.figure
        - notification.coordinate
        - notification.property
        - notification.ancestor
        - notification.layout_update
      secondary:
        - figure.lifecycle
        - validation.protocol
        - update_manager.two_phase
    dependencies:
      - M5
      - M6
    enables:
      - M8
      - M9
      - M10

  - id: M8
    title: Viewport / Scroll / Zoom
    layer: Viewport & Diagram Core
    status: not_started
    goal: >
      Implement Draw2D viewport, scrolling, and scaling as Figure-tree semantics
      rather than rendering-only shortcuts.
    scope:
      - Viewport figure
      - ScrollPane
      - RangeModel
      - ScrollBar model
      - ScalableFigure and scalable layered pane semantics
      - Viewport content clipping
      - Zoom transform integration
    non_scope:
      - GEF auto-expose
      - Viewer scroll policy
      - Selection feedback policy
    contracts:
      - Viewport must participate in Figure tree, coordinate conversion, hit testing, and damage repair.
      - Scrolling and zooming must use the same coordinate protocol as normal figures.
      - Content clip must affect rendering and hit testing consistently.
    probes:
      - Viewport content clip visual test
      - Scrolled origin coordinate tests
      - Zoomed hit-test tests
      - Nested viewport dirty-region mapping tests
    api_semantics:
      primary:
        - viewport.scroll_zoom
        - clipping.strategy
        - coordinate.conversion
        - hit_test.search
      secondary:
        - damage.repaint
        - update_manager.two_phase
        - layer.freeform
    dependencies:
      - M3
      - M4
      - M5
      - M7
    enables:
      - M9
      - M10

  - id: M9
    title: Connection / Anchor / Router
    layer: Viewport & Diagram Core
    status: not_started
    goal: >
      Add Draw2D diagram connection primitives without crossing into GEF editing
      tools or command semantics.
    scope:
      - Connection and PolylineConnection
      - Source and target anchors
      - Chopbox, ellipse, label, and XY anchors
      - Bendpoints
      - ConnectionRouter, Manhattan router, shortest path router, and fan router
      - ConnectionLayer
      - Decorations
    non_scope:
      - GEF connection creation tool
      - GEF reconnect policy
      - GEF command stack
    contracts:
      - Connection geometry is derived from anchors, router, and points.
      - Node movement must update dependent connections through explicit protocols.
      - Connection damage and hit testing must be consistent with its routed points.
    probes:
      - Anchor recomputation after node movement
      - Router point generation tests
      - Connection damage tests
      - Decoration rendering tests
      - Connection hit-test tests
    api_semantics:
      primary:
        - connection.figure
        - connection.anchor
        - connection.router
        - connection.locator
      secondary:
        - coordinate.conversion
        - damage.repaint
        - notification.ancestor
        - hit_test.search
    dependencies:
      - M2
      - M4
      - M5
      - M7
    enables:
      - M10

  - id: M10
    title: 常用 Figure 与文本/控件
    layer: Reusable Figures
    status: not_started
    goal: >
      Provide enough reusable Draw2D figures for real demos while ensuring they
      remain consumers of the core protocols rather than special cases.
    scope:
      - Promote deferred builtin Figures to full reusable status: ellipse, rounded rectangle, polygon, polyline, triangle
      - Confirm Rectangle remains the baseline core Shape and does not require special-case protocol forks
      - Label and image figure
      - Border implementations
      - Button-like and toggle-like figures
      - Basic text flow support
    non_scope:
      - Full rich-text editor
      - IME support
      - Full widget toolkit
      - GEF palette or viewer integration
    contracts:
      - Concrete figures must use bounds, layout, update, event, and notification protocols.
      - Border must affect insets and clientArea.
      - Text and label figures must expose preferred size.
    probes:
      - Shape rendering contract tests
      - Label preferred size tests
      - Border clientArea tests
      - Button-like event behavior tests
      - Basic text layout visual or snapshot tests
    api_semantics:
      primary:
        - builtin.figures
        - border.protocol
        - text.flow
        - widgets.basic
      secondary:
        - layout.manager
        - event.input_listeners
        - figure.properties
    dependencies:
      - M3
      - M6
      - M7
    enables: []

excluded_gef_capabilities:
  - EditPart
  - EditPolicy
  - Tool
  - Command
  - Request
  - Viewer
  - Palette
  - Selection provider
  - Undo and redo command stack

workflow_integration:
  delta_required_fields:
    - evolution_kind
    - contract
    - done_when
    - verification
  delta_conditionally_required_fields:
    milestone_id:
      applies_to: "Deltas created on or after 2026-06-11"
      rule: >
        Every architecture or parity delta created on or after 2026-06-11 must
        reference one of M1-M10 defined in this file, unless it is pure
        workflow maintenance or baseline debt cleanup.
      grandfathered: >
        Deltas created before 2026-06-11 (AD-001 through AD-019B and their
        CAD-NNN predecessors) are not required to backfill milestone_id. They
        may add it opportunistically when revisited for new work, but missing
        milestone_id on a pre-2026-06-11 delta is not a workflow blocker.
      rationale: >
        The milestone registry (M1-M10) was finalized on 2026-06-11. Earlier
        deltas were authored without milestone awareness and back-classifying
        them would risk inaccurate associations. The grandfather rule preserves
        accuracy while still enforcing milestone_id on all future work.
    api_semantics:
      applies_to: "Deltas created on or after 2026-06-18 that move M1-M10 forward"
      rule: >
        Every architecture or parity delta that moves a Draw2D core milestone
        forward must list affected api_semantics from the milestone's
        api_semantics.primary or api_semantics.secondary sets and state whether
        the semantic contract remains complete.
      grandfathered: >
        Existing deltas created before 2026-06-18 are not required to backfill
        api_semantics unless they are actively reopened to move milestone
        behavior, probes, or completion status forward.
      rationale: >
        API semantic coverage was introduced as a milestone audit layer on
        2026-06-18. Applying it only to forward-moving work keeps historical
        records stable while making future milestone progress auditable.
  completion_audit_layers:
    - Architecture contract coverage
    - Draw2D core milestone coverage
    - Draw2D API semantic coverage
    - Baseline and paused debt review
